server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # App data (served from a mount OUTSIDE the web root via alias) must always
    # be fresh (the updater rewrites it).
    location /data/ {
        alias /srv/dawghaus-data/;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # Service worker must never be hard-cached or updates won't ship.
    location = /sw.js {
        add_header Cache-Control "no-cache" always;
    }

    location = /manifest.webmanifest {
        types { } default_type application/manifest+json;
        add_header Cache-Control "no-cache" always;
    }

    # Shell assets (JS/CSS) and audio: tell browsers AND Cloudflare to
    # revalidate against the origin (ETag) so deploys ship instantly instead
    # of being pinned to Cloudflare's default 4h edge cache.
    location ~* \.(?:js|css|mp3|ogg|wav)$ {
        add_header Cache-Control "no-cache" always;
    }

    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
