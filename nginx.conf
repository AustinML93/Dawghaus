server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # App data must always be fresh (the updater rewrites it).
    location /data/ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Service worker should never be cached hard, or updates won't ship.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    location = /manifest.webmanifest {
        types { } default_type application/manifest+json;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
