services:
  web:
    image: nginx:alpine
    container_name: dawghaus-web
    restart: unless-stopped
    ports:
      - "1889:80"            # 1889 = UW's first-ever football game. Point the CF tunnel here.
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./data:/usr/share/nginx/html/data:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  updater:
    image: python:3.12-alpine
    container_name: dawghaus-updater
    restart: unless-stopped
    working_dir: /app
    command: ["python", "update.py"]
    environment:
      - UPDATE_INTERVAL=21600   # 6h; bump down to ~1800 once the season starts
      - DATA_DIR=/data
    volumes:
      - ./updater:/app:ro
      - ./data:/data            # shared with web (read-only there)
